name: Ridge Ride
options:
  bundleIdPrefix: com.shimondeitel.ridgeride
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  RidgeRide:
    type: application
    platform: iOS
    sources:
      - path: RidgeRide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridgeride
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: RidgeRide/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  RidgeRideTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: RidgeRideTests
      - path: RidgeRide.storekit
    dependencies:
      - target: RidgeRide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridgeride.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  RidgeRideUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RidgeRideUITests
    dependencies:
      - target: RidgeRide
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ridgeride.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  RidgeRide:
    build:
      targets:
        RidgeRide: all
        RidgeRideTests: [test]
        RidgeRideUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: RidgeRide.storekit
    test:
      config: Debug
      storeKitConfiguration: RidgeRide.storekit
      targets:
        - RidgeRideTests
        - RidgeRideUITests
    archive:
      config: Release
